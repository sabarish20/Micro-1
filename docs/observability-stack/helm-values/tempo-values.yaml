# tempo-values.yaml — Single binary mode for minikube

tempo:
  reportingEnabled: false

  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  # Accept traces from OTel Collector and direct OTLP
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317
    jaeger:
      protocols:
        thrift_http:
          endpoint: 0.0.0.0:14268
        grpc:
          endpoint: 0.0.0.0:14250

  # Link traces back to metrics via service graph
  metricsGenerator:
    enabled: true
    remoteWriteUrl: "http://kube-prom-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"

  # Retention for local minikube — 7 days
  retention: 168h

persistence:
  enabled: true
  size: 10Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
