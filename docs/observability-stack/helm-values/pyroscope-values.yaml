# pyroscope-values.yaml — Continuous profiling for minikube

pyroscope:
  replicationFactor: 1

  storage:
    backend: filesystem
    filesystem:
      dir: /data/pyroscope

  # Enable the eBPF agent for zero-instrumentation profiling
  # Profiles every process on every node without any code changes
  ebpf:
    enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

persistence:
  enabled: true
  size: 5Gi

# The eBPF agent runs as a DaemonSet alongside the main Pyroscope server
agent:
  enabled: true
  kind: DaemonSet

  config:
    server:
      address: pyroscope.profiling.svc.cluster.local:4040

    # Profile every container running in the cluster
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_pyroscope_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
